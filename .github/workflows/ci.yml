name: CI

# The green gate the autonomous pipeline merges against. Branch protection on
# `main` should require the `quality-gate` check (see scripts/pipeline/bootstrap_github.sh).

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy strict)
        run: mypy src
      - name: Test (pytest + coverage)
        run: python -m pytest --cov=docguard --cov-report=term-missing

  # Single stable check name for branch protection. Passes only if every
  # matrix leg passed.
  quality-gate:
    name: quality-gate
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all test legs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test matrix did not pass: ${{ needs.test.result }}"
            exit 1
          fi
          echo "All quality checks passed."
